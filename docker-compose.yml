services:
  # -------------------------------------------------------------------------
  # Worker – Batch-Klassifizierungs-Job
  # Nicht dauerhaft – wird per "docker compose run" gestartet.
  # Beispiel: docker compose run --rm worker --mode classify --max-files 50 --dry-run
  # -------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    # Kein Volume local-reports mehr – Reports gehen direkt nach Azure
    entrypoint: ["python", "-m", "app.main"]
    profiles:
      - worker  # verhindert unbeabsichtigtes Starten per "docker compose up"

  # -------------------------------------------------------------------------
  # Dashboard – Streamlit UI (dauerhaft laufend, liest aus Azure)
  # Starten: docker compose up dashboard
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      # Persist Azure token cache across container rebuilds – avoids repeated device-code login
      - dashboard-token-cache:/home/dashboard
    restart: unless-stopped
    command: >
      streamlit run app.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.headless=true
      --browser.gatherUsageStats=false

volumes:
  # Named volume so the Azure MSAL token cache survives docker compose build/up
  dashboard-token-cache:
